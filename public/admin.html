<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhtasham - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ASOSIY KONTEYNER -->
    <main class="premise-container-main">
        
        <!-- TEPADAGI SARIQ VA YASHIL SERVER TUGMALARI -->
        <section class="premise-section-btn-up">
            <button onclick="uploadLocalDataToBackend()" class="btn-premise-gold">SERVERGA SAQLASH 💾</button>
            <button onclick="downloadDataFromBackend()" class="btn-premise-green">SERVERDAN TIKLASH 🔄</button>
        </section>

        <!-- O'QITUVCHI QO'SHISH BOSH SARLAVHASI -->
        <header class="premise-header-title">
            <img src="./img/ph_chalkboard-teacher-fill.svg" alt="">
            <h1>50 TA O'QITUVCHINI RO'YXATGA OLISH VA SOZLASH</h1>
        </header>

        <!-- FORMA BOSHIDAN INPUTLAR TIZIMI -->
        <form onsubmit="addTeacher(event)" class="premise-form-main">
            
            <section class="premise-section-double-input">
                <div>
                    <p>Ustoz Ism Familiyasi:</p>
                    <input type="text" id="teacherName" placeholder="Davlatjon domla" required>
                </div>
                <div>
                    <p>O'tadigan Fani:</p>
                    <input type="text" id="teacherSubject" placeholder="Ingliz tili" required>
                </div>
            </section>

            <section class="premise-section-double-input">
                <div>
                    <p>Guruh Nomi:</p>
                    <input type="text" id="teacherGroup" placeholder="Sefr" required>
                </div>
                <div class="div-time-up">
                    <p>Dars Soati:</p>
                    <div class="premise-div-time">
                        <input type="time" id="startTime" required>
                        <input type="time" id="endTime" required>
                    </div>
                </div>
            </section>

            <!-- HAFTALIK KUNLAR TIZIMI -->
            <section class="premise-section-day-checkbox">
                <p>Haftalik Dars Kunlarini Tanlang:</p>
                <div class="premise-div-checkbox-main">
                    <label class="premise-label-checkbox">
                        <input type="checkbox" name="days" value="Dushanba">
                        <span>Dushanba</span>
                    </label>
                    <label class="premise-label-checkbox">
                        <input type="checkbox" name="days" value="Seshanba">
                        <span>Seshanba</span>
                    </label>
                    <label class="premise-label-checkbox">
                        <input type="checkbox" name="days" value="Chorshanba">
                        <span>Chorshanba</span>
                    </label>
                    <label class="premise-label-checkbox">
                        <input type="checkbox" name="days" value="Payshanba">
                        <span>Payshanba</span>
                    </label>
                    <label class="premise-label-checkbox">
                        <input type="checkbox" name="days" value="Juma">
                        <span>Juma</span>
                    </label>
                    <label class="premise-label-checkbox">
                        <input type="checkbox" name="days" value="Shanba">
                        <span>Shanba</span>
                    </label>
                    <label class="premise-label-checkbox">
                        <input type="checkbox" name="days" value="Yakshanba">
                        <span>Yakshanba</span>
                    </label>
                </div>
            </section>

            <section class="premise-section-double-input">
                <div>
                    <p>Tizim Login:</p>
                    <input type="text" id="teacherLogin" placeholder="davlatjon" required>
                </div>
                <div>
                    <p>Tizim Parol:</p>
                    <input type="password" id="teacherPass" placeholder="davlatjon123" required>
                </div>
            </section>

            <!-- KATTA TO'Q SARIQ TUGMA -->
            <button type="submit" class="btn-premise-gold-long">USTOZNI TAYMER BILAN SAQLASH +</button>
        </form>

    </main>

    <!-- SCRIPT TIZIMI -->
    <script src="script.js"></script>
</body>
</html>

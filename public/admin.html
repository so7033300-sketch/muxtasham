<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - EduManage CRM</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { align-items: flex-start; }
        .flex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-box { width: 300px; margin-bottom: 0; }
        .danger-btn { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); }
        .danger-btn:hover { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4); }
        .inline-form { display: flex; gap: 10px; align-items: center; }
        .inline-form input { padding: 8px 12px; font-size: 13px; }
        .inline-form .btn { padding: 8px 15px; font-size: 13px; width: auto; }
        select option { background-color: #1e1b4b !important; color: #ffffff !important; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- Yuqori Boshqaruv Qismi (Header) - Qidiruv o'rniga Markaz Foydasi qo'yildi -->
        <div class="flex-header glass-container" style="max-width: 100%; padding: 20px 40px; border-radius: 16px;">
            <h2 style="margin-bottom: 0;">Admin Boshqaruv Paneli</h2>
            <div style="font-size: 16px; font-weight: 500;">
                Markaz sof foydasi: <span class="status-badge status-paid" id="centerProfitDisplay" style="font-size: 16px; padding: 8px 16px;">0 so'm</span>
            </div>
            <button class="btn danger-btn" style="width: auto; padding: 10px 20px;" onclick="logout()">Chiqish</button>
        </div>

        <!-- Formlar -->
        <div class="grid-2">
            <!-- Yangi O'quvchi Qo'shish Oynasi -->
            <div class="card glass-container" style="max-width: 100%;">
                <h3>Yangi O'quvchi Qo'shish</h3>
                <form id="studentForm">
                    <div class="input-group">
                        <input type="text" id="studName" placeholder="F.I.Sh (Ism Familya)" required>
                    </div>
                    <div class="input-group">
                        <input type="text" id="studPhone" placeholder="Telefon raqami (998901234567)" required>
                    </div>
                    <div class="input-group">
                        <input type="number" id="studBirth" placeholder="Tug'ilgan yili (Yil)" required>
                    </div>
                    <div class="input-group">
                        <select id="studFee" required>
                            <option value="" disabled selected>Oylik to'lov miqdorini tanlang</option>
                            <option value="250000">250 000 so'm</option>
                            <option value="300000">300 000 so'm</option>
                            <option value="350000">350 000 so'm</option>
                            <option value="400000">400 000 so'm</option>
                            <option value="450000">450 000 so'm</option>
                            <option value="500000">500 000 so'm</option>
                            <option value="550000">550 000 so'm</option>
                            <option value="600000">600 000 so'm</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <input type="text" id="parentChatId" placeholder="Ota-ona Telegram Chat ID (ixtiyoriy)">
                    </div>
                    <button type="submit" class="btn">O'quvchini Saqlash</button>
                </form>
            </div>

            <!-- Yangi O'qituvchi Qo'shish Oynasi -->
            <div class="card glass-container" style="max-width: 100%;">
                <h3>Yangi O'qituvchi Qo'shish</h3>
                <form id="teacherForm">
                    <div class="input-group">
                        <input type="text" id="teachName" placeholder="O'qituvchi F.I.Sh" required>
                    </div>
                    <div class="input-group">
                        <input type="text" id="teachSubject" placeholder="Qaysi fandan dars berishi" required>
                    </div>
                    <div class="grid-2" style="margin-bottom: 0; gap: 10px;">
                        <div class="input-group">
                            <input type="time" id="teachTimeStart" title="Dars boshlanish vaqti" required>
                        </div>
                        <div class="input-group">
                            <input type="time" id="teachTimeEnd" title="Dars tugash vaqti" required>
                        </div>
                    </div>
                    
                    <div class="input-group" style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);">
                        <label style="display: block; margin-bottom: 10px; color: #38bdf8; font-size: 14px; font-weight: 500;">Dars kunlarini tanlang:</label>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;">
                                <input type="checkbox" name="teachDaysCheck" value="Dushanba" style="width: auto; padding: 0;"> Dushanba
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;">
                                <input type="checkbox" name="teachDaysCheck" value="Seshanba" style="width: auto; padding: 0;"> Seshanba
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;">
                                <input type="checkbox" name="teachDaysCheck" value="Chorshanba" style="width: auto; padding: 0;"> Chorshanba
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;">
                                <input type="checkbox" name="teachDaysCheck" value="Payshanba" style="width: auto; padding: 0;"> Payshanba
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;">
                                <input type="checkbox" name="teachDaysCheck" value="Juma" style="width: auto; padding: 0;"> Juma
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;">
                                <input type="checkbox" name="teachDaysCheck" value="Shanba" style="width: auto; padding: 0;"> Shanba
                            </label>
                        </div>
                    </div>

                    <div class="grid-2" style="margin-bottom: 0; gap: 10px;">
                        <div class="input-group">
                            <input type="text" id="teachLogin" placeholder="Login" required>
                        </div>
                        <div class="input-group">
                            <input type="password" id="teachPass" placeholder="Parol" required>
                        </div>
                    </div>
                    <button type="submit" class="btn">O'qituvchini Saqlash</button>
                </form>
            </div>
        </div>

        <!-- Barcha O'quvchilar Jadvali — Qidiruv aynan rasmda ko'rsatilgan joyga tushirildi -->
        <div class="card glass-container" style="max-width: 100%; margin-bottom: 30px;">
            <div class="flex-header">
                <h3 style="margin-bottom: 0;">Barcha O'quvchilar Ro'yxati</h3>
                <div class="input-group search-box">
                    <input type="text" id="searchStudent" placeholder="O'quvchini ism bo'yicha qidirish..." oninput="filterStudents()">
                </div>
                <button class="btn danger-btn" style="width: auto; padding: 8px 15px; font-size: 13px;" onclick="clearData('all')">Hamma Ma'lumotlarni Tozalash</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Ism Familya</th>
                            <th>Telefon raqam</th>
                            <th>Tug'ilgan yili</th>
                            <th>Oylik To'lov</th>
                            <th>Balans</th>
                            <th>To'lov Qabul Qilish</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Kunlik Davomat Tarixi -->
        <div class="card glass-container" style="max-width: 100%; margin-bottom: 30px;">
            <div class="flex-header">
                <h3 style="margin-bottom: 0;">Kunlik Davomat Tarixi</h3>
                <button class="btn danger-btn" style="width: auto; padding: 8px 15px; font-size: 13px;" onclick="clearData('attendance')">Davomatni Tozalash</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Sana</th>
                            <th>O'quvchi F.I.Sh</th>
                            <th>O'qituvchi</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTableBody">
                    </tbody>
                </table>
            </div>
        </div>

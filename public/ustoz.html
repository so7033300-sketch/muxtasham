<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'qituvchi Paneli - EduManage CRM</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { align-items: flex-start; }
        .flex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .teacher-info { display: flex; gap: 20px; font-size: 15px; color: #94a3b8; }
        .teacher-info strong { color: #38bdf8; }
        .btn-success { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2); width: auto; padding: 8px 15px; font-size: 13px; }
        .btn-success:hover { background: linear-gradient(135deg, #16a34a 0%, #166534 100%); box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4); }
        .btn-danger-action { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); width: auto; padding: 8px 15px; font-size: 13px; }
        .btn-danger-action:hover { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4); }
        .btn-disabled { background: #334155 !important; color: #64748b !important; cursor: not-allowed !important; transform: none !important; box-shadow: none !important; }
        .time-badge { background: rgba(234, 179, 8, 0.15); color: #eab308; padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- Yuqori qism (Header) -->
        <div class="flex-header glass-container" style="max-width: 100%; padding: 25px 40px; border-radius: 16px;">
            <div>
                <h2 id="teacherNameHeader" style="margin-bottom: 5px; text-align: left;">Ustoz Paneli</h2>
                <div class="teacher-info">
                    <span>Fan: <strong id="teacherSubject">-</strong></span>
                    <span>Dars kunlari: <strong id="teacherDays">-</strong></span>
                    <span>Dars vaqti: <strong id="teacherTime">-</strong></span>
                </div>
            </div>
            
            <div style="text-align: right; display: flex; flex-direction: column; gap: 10px;">
                <div>Shaxsiy balans (Oylik): <span class="status-badge status-paid" id="teacherSalary" style="font-size: 16px;">0 so'm</span></div>
                <button class="btn" style="width: auto; padding: 8px 20px; background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);" onclick="logout()">Tizimdan Chiqish</button>
            </div>
        </div>

        <!-- Dars Holati haqida bildirishnoma -->
        <div id="timeStatusNotice" class="card glass-container" style="max-width: 100%; margin-bottom: 25px; text-align: center; font-weight: 500;">
            Tekshirilmoqda...
        </div>

        <!-- O'quvchilar Ro'yxati va Davomat Jadvali -->
        <div class="card glass-container" style="max-width: 100%;">
            <h3>Darsingizdagi O'quvchilar Ro'yxati</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Ism Familya</th>
                            <th>Telefon raqam</th>
                            <th>Tug'ilgan yili</th>
                            <th>O'quvchi Balansi</th>
                            <th>Davomat (Faqat dars vaqtida faollashadi)</th>
                        </tr>
                    </thead>
                    <tbody id="teacherStudentsTable">
                        <!-- Dinamik o'quvchilar ro'yxati -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- 2-BO'LAK (Mantiq qismi) pastda alohida berilgan, uni shu yerga joylaysiz -->
</body>
</html>
<script>
    const API_URL = 'http://localhost:3000/api';
    const currentTeacherId = localStorage.getItem('teacherId');

    if (!currentTeacherId) {
        window.location.href = 'index.html';
    }

    // Haftaning kunlarini o'zbekcha nomlariga moslash
    const weekDaysUz = {
        0: "Yashanba",
        1: "Dushanba",
        2: "Chorshanba",
        3: "Chorshanba", // Jurnal xatolarini oldini olish uchun
        4: "Payshanba",
        5: "Juma",
        6: "Shanba"
    };
    
    // Aniq dars kunlarini tekshirish uchun o'zbekcha nomlar lug'ati
    const dayIndexMap = {
        "dushanba": 1, "seshanba": 2, "chorshanba": 3, "payshanba": 4, "juma": 5, "shanba": 6, "yakshanba": 0
    };

    async function loadTeacherDashboard() {
        try {
            const response = await fetch(`${API_URL}/data`);
            const data = await response.json();

            const teacher = data.teachers.find(t => t.id === currentTeacherId);
            if (!teacher) {
                alert("O'qituvchi ma'lumotlari topilmadi!");
                logout();
                return;
            }

            // Ustoz ma'lumotlarini ekranga chiqarish
            document.getElementById('teacherNameHeader').innerText = teacher.name;
            document.getElementById('teacherSubject').innerText = teacher.subject;
            document.getElementById('teacherDays').innerText = teacher.days.join(', ');
            document.getElementById('teacherTime').innerText = `${teacher.timeStart} - ${teacher.timeEnd}`;
            document.getElementById('teacherSalary').innerText = `${teacher.salary.toLocaleString()} so'm`;

            // Dars vaqti kelgan yoki kelmaganini tekshirish
            const isLessonTime = checkLessonTime(teacher);
            renderStudents(data.students, isLessonTime);

        } catch (err) {
            console.error("Xatolik:", err);
        }
    }

    // Dars kuni va vaqtini aniqlash algoritmi
    function checkLessonTime(teacher) {
        const now = new Date();
        const currentDayIndex = now.getDay(); // 0-6 gacha raqam
        const currentTimeStr = now.toTimeString().split(' ')[0].substring(0, 5); // "14:30" formatda

        // Bugun dars kuni borligini tekshirish
        const hasLessonToday = teacher.days.some(day => {
            return dayIndexMap[day.toLowerCase().trim()] === currentDayIndex;
        });

        if (!hasLessonToday) {
            document.getElementById('timeStatusNotice').innerHTML = `⚠️ Bugun dars kuningiz emas. Davomat tizimi yopiq.`;
            document.getElementById('timeStatusNotice').style.color = '#f87171';
            return false;
        }

        // Soatni tekshirish (Dars boshlanishi va tugashi oralig'i)
        if (currentTimeStr >= teacher.timeStart && currentTimeStr <= teacher.timeEnd) {
            document.getElementById('timeStatusNotice').innerHTML = `✅ Dars vaqti faol (${teacher.timeStart} - ${teacher.timeEnd}). Davomat qilishingiz mumkin.`;
            document.getElementById('timeStatusNotice').style.color = '#4ade80';
            return true;
        } else {
            document.getElementById('timeStatusNotice').innerHTML = `🔒 Dars vaqti emas (Hozirgi vaqt: ${currentTimeStr}). Davomat tizimi yopilgan.`;
            document.getElementById('timeStatusNotice').style.color = '#eab308';
            return false;
        }
    }

    // O'quvchilarni chiqarish va tugmalarni boshqarish
    function renderStudents(students, isLessonTime) {
        const tbody = document.getElementById('teacherStudentsTable');
        tbody.innerHTML = '';

        students.forEach(s => {
            const isDebtor = s.balance <= -150000 ? 'debtor-row' : '';
            const balanceClass = s.balance >= 0 ? 'status-paid' : 'status-debt';
            
            // Agar dars vaqti bo'lmasa tugmalarni bloklash klassi qo'shiladi
            const disabledAttr = isLessonTime ? '' : 'disabled';
            const btnClassExtension = isLessonTime ? '' : 'btn-disabled';

            tbody.innerHTML += `
                <tr class="${isDebtor}">
                    <td><strong>${s.name}</strong></td>
                    <td>${s.phone}</td>
                    <td>${s.birthYear}-yil</td>
                    <td><span class="status-badge ${balanceClass}">${s.balance.toLocaleString()} so'm</span></td>
                    <td>
                        <div style="display: flex; gap: 10px;">
                            <button ${disabledAttr} class="btn btn-success ${btnClassExtension}" onclick="submitAttendance('${s.id}', 'keldi')">Keldi</button>
                            <button ${disabledAttr} class="btn btn-danger-action ${btnClassExtension}" onclick="submitAttendance('${s.id}', 'kelmadi')">Kelmadi</button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    // Davomatni serverga yuborish logikasi
    async function submitAttendance(studentId, status) {
        if (!confirm(`O'quvchini '${status.toUpperCase()}' deb belgilamoqchimisiz? (Balansdan pul yechiladi)`)) return;

        try {
            const response = await fetch(`${API_URL}/attendance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    teacherId: currentTeacherId,
                    studentId: studentId,
                    status: status
                })
            });

            if (response.ok) {
                alert("Davomat saqlandi, ota-onaga bildirishnoma yuborildi va mablag' muvaffaqiyatli taqsimlandi!");
                loadTeacherDashboard(); // Ma'lumotlarni yangilash
            } else {
                alert("Xatolik yuz berdi.");
            }
        } catch (err) {
            alert("Server bilan aloqa uzildi!");
        }
    }

    function logout() {
        localStorage.removeItem('teacherId');
        window.location.href = 'index.html';
    }

    // Sahifa ochilishi bilan ma'lumotlarni yuklash
    window.onload = loadTeacherDashboard;
</script>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhtasham CRM - Avtorizatsiya</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #060508; color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        .login-layout { width: 100%; max-width: 420px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #fbbf24; font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .login-header p { color: #8a8a8a; font-size: 14px; margin-top: 5px; }
        .form-group-margin { margin-bottom: 22px; }
        .form-group-margin label { display: block; margin-bottom: 8px; color: #fbbf24; font-weight: 700; font-size: 13px; text-transform: uppercase; }
        .role-selector { display: flex; gap: 12px; margin-bottom: 25px; background: #120e07; padding: 6px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.05); }
        .role-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: transparent; color: #8a8a8a; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.3s ease; }
        .role-btn.active { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #060508; }
    </style>
</head>
<body>

    <div class="login-layout">
        
        <div class="login-header">
            <h1>Muhtasham CRM</h1>
            <p>Tizimga kirish uchun login va parolingizni kiriting</p>
        </div>

        <!-- PREMIUM CARD FORMA -->
        <div class="premium-card" style="border-color: rgba(245, 158, 11, 0.2);">
            
            <!-- ROLNI TANLASH (ADMIN YOKI USTOZ) -->
            <div class="role-selector">
                <button type="button" id="btn-role-teacher" onclick="changeLoginRole('teacher')" class="role-btn active">Ustoz Kirishi</button>
                <button type="button" id="btn-role-admin" onclick="changeLoginRole('admin')" class="role-btn">Admin Kirishi</button>
            </div>

            <form onsubmit="executeLoginSystem(event)">
                
                <div class="form-group-margin">
                    <label>Tizim Login:</label>
                    <input type="text" id="loginUser" class="premium-input" placeholder="Loginni yozing" required>
                </div>

                <div class="form-group-margin">
                    <label>Tizim Parol:</label>
                    <input type="password" id="passUser" class="premium-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-premium-gold" style="margin-top: 10px; padding: 16px; font-weight: 800; font-size: 16px;">
                    TIZIMGA KIRISH →
                </button>
            </form>
        </div>

    </div>

    <!-- TO'G'RIDAN-TO'G'RI INTERFEYS ICHIDAGI MUSTAQIL LOGIKA -->
    <script>
        let currentSelectedRole = 'teacher';

        function changeLoginRole(role) {
            currentSelectedRole = role;
            const tBtn = document.getElementById('btn-role-teacher');
            const aBtn = document.getElementById('btn-role-admin');
            if (!tBtn || !aBtn) return;
            
            if (role === 'admin') {
                aBtn.classList.add('active');
                tBtn.classList.remove('active');
            } else {
                tBtn.classList.add('active');
                aBtn.classList.remove('active');
            }
        }

        function executeLoginSystem(event) {
            event.preventDefault();
            const logVal = document.getElementById('loginUser').value.trim();
            const passVal = document.getElementById('passUser').value.trim();

            if (currentSelectedRole === 'admin') {
                if (logVal === 'admin' && passVal === 'admin123') {
                    localStorage.setItem('adminIsactive', 'true');
                    alert("Welcome! Administrator tizimga muvaffaqiyatli kirdi. 🎉");
                    window.location.href = './admin.html'; // Xavfsiz marshrutlash
                } else {
                    alert("❌ Admin login yoki paroli noto'g'ri!");
                }
                return;
            }

            let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
            const found = teachers.find(t => t.login === logVal && t.pass === passVal);

            if (found) {
                localStorage.setItem('loggedInTeacher', JSON.stringify(found));
                alert(`✅ Xush kelibsiz, ${found.name}! Tizim muvaffaqiyatli ochildi.`);
                window.location.href = './ustoz.html'; // Xavfsiz marshrutlash
            } else {
                alert("❌ Ustoz login yoki paroli noto'g'ri!");
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManage CRM - Tizimga Kirish</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="glass-container">
        <h2>EduManage CRM</h2>
        <h3 style="font-size: 14px; margin-top: -15px; color: #94a3b8; -webkit-text-fill-color: initial;">O'quv Markazi Boshqaruv Tizimi</h3>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="loginInput" placeholder="Loginni kiriting" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Parolni kiriting" required>
            </div>
            
            <button type="submit" class="btn">Tizimga Kirish</button>
        </form>
        
        <div id="errorMessage" style="color: #f87171; text-align: center; margin-top: 15px; font-size: 14px; display: none;"></div>
    </div>

    <!-- Barcha sahifalar uchun umumiy bo'lgan tashqi mantiqiy fayl -->
    <script src="/script.js"></script>
</body>
</html>

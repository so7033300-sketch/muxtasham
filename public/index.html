<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManage CRM - Tizimga Kirish</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <h2>EduManage CRM</h2>
        <h3 style="font-size: 14px; margin-top: -15px; color: #94a3b8; -webkit-text-fill-color: initial;">O'quv Markazi Boshqaruv Tizimi</h3>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="loginInput" placeholder="Loginni kiriting" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Parolni kiriting" required>
            </div>
            
            <button type="submit" class="btn">Tizimga Kirish</button>
        </form>
        
        <div id="errorMessage" style="color: #f87171; text-align: center; margin-top: 15px; font-size: 14px; display: none;"></div>
    </div>

    <!-- Tizim logikasi ulangan skript -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const login = document.getElementById('loginInput').value;
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                const response = await fetch('https://muxtasham-jgqv.onrender.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (data.role === 'teacher') {
                        localStorage.setItem('teacherId', data.teacherId);
                        window.location.href = 'ustoz.html';
                    }
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = data.message;
                }
            } catch (err) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = "Server bilan aloqa uzildi!";
            }
        });
    </script>
</body>
</html>
